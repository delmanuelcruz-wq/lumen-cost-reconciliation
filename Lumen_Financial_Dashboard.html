<script>

    var totJB=0,totJA=0,totJC=0,totFB=0,totFA=0,totFC=0;
    segOrder.forEach(function(name){
      var seg=segs[name]; var cls=seg.classes;
      var ja=0,jc=0,fa=0,fc=0;
      cls.forEach(function(c){

        if(febS[c]){fa+=febS[c].sales;fc+=febS[c].cost}

      var jb=seg.budget_jan;var fb=seg.budget_feb;
      totJB+=jb;totJA+=ja;totJC+=jc;totFB+=fb;totFA+=fa;totFC+=fc;
      segStats[name]={ja:ja,jc:jc,jb:jb,fa:fa,fc:fc,fb:fb,
        jgm:ja?1-jc/ja:0,fgm:fa?1-fc/fa:0,ytdgm:(ja+fa)?1-(jc+fc)/(ja+fa):0};
    });
    return {segStats:segStats,segOrder:segOrder,totJA:totJA,totJC:totJC,totJB:totJB,totFA:totFA,totFC:totFC,totFB:totFB,

    return inv;

  },[]);

    var list=allInv;

    if(search){var q=search.toLowerCase();list=list.filter(function(i){

        i.customer.toLowerCase().includes(q)||i.product_id.toLowerCase().includes(q)||i.project.toLowerCase().includes(q);

    var csv=[h.join(',')].concat(rows).join('\n');
    var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='lumen_financial_export.csv';a.click();URL.revokeObjectURL(url);
  }

  return React.createElement('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column'}},
    // Header
